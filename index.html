<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Play Rock Paper Scissors against Computer! Vanilla JS game with persistent scores, dark theme, and smooth animations. First project by junior dev Carl Amiel Balita ">

    <title>Javascript Project- Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <p class="title">Rock Paper Scissors</p>

    <div class="buttons">

    <button onclick="playGame('rock')" class="move-button"><img src="assets/images/rock-emoji.png" alt="Rock" class="move-icon"></button>

    <button onclick="playGame('paper')" class="move-button"><img src="assets/images/paper-emoji.png" class="move-icon" alt="Paper"></button>

    <button onclick="playGame('scissors');" class="move-button"><img src="assets/images/scissors-emoji.png" class="move-icon" alt="Scissors"></button>

    </div>

    <p class="js-result result">Result</p>

    <p class="js-moves "></p>

    <p  class="js-score score"></p>

    <div class="button-group">
    <button onclick="
     score.wins = 0;
     score.loses = 0;
     score.ties = 0;
     localStorage.removeItem('score');
     updateScoreElement();
    " class="reset-score-button">Reset Score</button>

    <button onclick="autoPlay()" class="js-auto auto-button">Auto play</button>
    </div>

    <script src="script.js"></script>

</body>
</html>
